<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>照片裁成拼图</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- 标题区 -->
    <header class="header">
      <h1 class="gradient-text">照片裁成拼图</h1>
      <p class="header-sub">完整保留 · 白边适配 · 35-520片</p>
    </header>

    <!-- 上传/预览区 -->
    <section class="card preview-card" id="previewSection">
      <div class="upload-area" id="uploadArea">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <div class="upload-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
          </div>
          <p class="upload-text">点击上传或拖拽图片</p>
          <p class="upload-hint">支持 JPG / PNG / WebP / TIFF 等格式</p>
        </div>
        <div class="preview-container" id="previewContainer" style="display:none">
          <div class="preview-header">
            <span class="preview-title">拼图预览</span>
            <button class="btn btn-ghost btn-sm" id="reUploadBtn">重新上传</button>
          </div>
          <div class="preview-canvas-wrapper" id="canvasWrapper">
            <canvas id="previewCanvas"></canvas>
            <div class="drag-hint" id="dragHint">↕ 拖拽调整位置</div>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/tiff,image/bmp,image/gif,image/svg+xml,image/avif" hidden />
      </div>
    </section>

    <!-- 控制区 -->
    <section class="controls" id="controlsSection" style="display:none">
      <!-- 尺寸选择 -->
      <div class="card controls-card">
        <label class="control-label">选择尺寸</label>
        <div class="size-scroll" id="sizeScroll">
          <!-- JS 生成 -->
        </div>
      </div>

      <!-- 输出质量 -->
      <div class="card controls-card">
        <label class="control-label">输出质量</label>
        <div class="quality-group" id="qualityGroup">
          <!-- JS 生成 -->
        </div>
      </div>

      <!-- 标签切换 -->
      <div class="card controls-card">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="adjust">调整</button>
          <button class="tab-btn" data-tab="color">颜色</button>
        </div>

        <!-- 调整面板 -->
        <div class="tab-panel active" id="panelAdjust">
          <details class="adjust-details" id="adjustDetails">
            <summary class="adjust-summary">
              <span id="adjustSummaryText">缩放 100% · 位置微调</span>
              <span class="chevron">▼</span>
            </summary>
            <div class="adjust-content">
              <!-- 缩放 -->
              <div class="slider-group">
                <label class="slider-label">
                  <span>缩放</span>
                  <span class="slider-value" id="zoomValue">100%</span>
                </label>
                <input type="range" class="slider" id="zoomSlider" min="50" max="150" value="100" step="1" />
              </div>
              <!-- 水平偏移 -->
              <div class="slider-group">
                <label class="slider-label">
                  <span>水平偏移</span>
                  <span class="slider-value" id="offsetXValue">0%</span>
                </label>
                <input type="range" class="slider" id="offsetXSlider" min="-100" max="100" value="0" step="1" />
              </div>
              <!-- 垂直偏移 -->
              <div class="slider-group">
                <label class="slider-label">
                  <span>垂直偏移</span>
                  <span class="slider-value" id="offsetYValue">0%</span>
                </label>
                <input type="range" class="slider" id="offsetYSlider" min="-100" max="100" value="0" step="1" />
              </div>
              <!-- 旋转 -->
              <div class="rotate-group">
                <button class="btn btn-outline btn-icon" id="rotateLeftBtn">↺ 左转90°</button>
                <button class="btn btn-outline btn-icon" id="rotateRightBtn">↻ 右转90°</button>
              </div>
            </div>
          </details>
        </div>

        <!-- 颜色面板 -->
        <div class="tab-panel" id="panelColor">
          <div class="color-grid" id="colorGrid">
            <!-- JS 生成 -->
          </div>
        </div>
      </div>

      <!-- 下载按钮 -->
      <button class="btn btn-download" id="downloadBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        下载高清图片
      </button>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
